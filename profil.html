<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes Commandes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
</head>
<body style="padding:40px;">
    <a href="index.html" style="color:#3b82f6; text-decoration:none;">← Boutique</a>
    <h1>📦 Mon Historique</h1>
    <div id="historique-list" style="display:flex; flex-direction:column; gap:15px; margin-top:20px;"></div>

    <script>
        const pb = new PocketBase('http://127.0.0.1:8090');
        async function load() {
            if(!pb.authStore.isValid) return window.location.href="login.html";
            const res = await pb.collection('commandes').getFullList({
                filter: `client = "${pb.authStore.model.id}"`,
                sort: '-created'
            });
            document.getElementById('historique-list').innerHTML = res.map(c => `
                <div style="background:#1e293b; padding:20px; border-radius:10px; border:1px solid #334155;">
                    <div style="color:#94a3b8; font-size:0.8rem;">Le ${new Date(c.created).toLocaleDateString()}</div>
                    <div style="margin:10px 0;">${c.produits}</div>
                    <div style="color:#4ade80; font-weight:bold;">Total: ${c.total}€</div>
                </div>
            `).join('') || "Aucune commande.";
        }
        load();
    </script>
</body>
</html>
