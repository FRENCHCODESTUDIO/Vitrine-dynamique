<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin | TechStore</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
</head>
<body style="padding:30px; max-width:900px; margin:0 auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h1>⚙️ Dashboard Admin</h1>
        <a href="index.html" style="color:#3b82f6;">← Retour Boutique</a>
    </div>

    <div class="admin-box">
        <h2 style="color:#4ade80;">📦 Ajouter un Produit</h2>
        <form id="f-prod">
            <input type="text" id="n-nom" placeholder="Nom du produit" required>
            <input type="number" id="n-prix" placeholder="Prix (€)" required>
            <input type="text" id="n-cat" placeholder="Catégorie (ex: Watercooling)">
            <input type="number" id="n-stock" placeholder="Stock" required>
            <input type="file" id="n-photo">
            <button type="submit" class="btn-buy">CRÉER</button>
        </form>
    </div>

    <div class="admin-box" style="border-left:5px solid #fbbf24; margin-top:20px;">
        <h2 style="color:#fbbf24;">🏷️ Codes Promo</h2>
        <form id="f-promo" style="display:flex; gap:10px;">
            <input type="text" id="c-code" placeholder="Code (ex: NOEL20)" required>
            <input type="number" id="c-reduc" placeholder="-%" required style="width:80px;">
            <button type="submit" style="background:#fbbf24; border:none; border-radius:5px; padding:0 15px; font-weight:bold; cursor:pointer;">OK</button>
        </form>
        <div id="list-promos" style="margin-top:15px;"></div>
    </div>

    <script>
        const pb = new PocketBase('http://127.0.0.1:8090');

        document.getElementById('f-prod').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('nom', document.getElementById('n-nom').value);
            fd.append('prix', document.getElementById('n-prix').value);
            fd.append('categorie', document.getElementById('n-cat').value);
            fd.append('stock', document.getElementById('n-stock').value);
            if(document.getElementById('n-photo').files[0]) fd.append('photo', document.getElementById('n-photo').files[0]);
            await pb.collection('produits').create(fd);
            alert("Produit ajouté !"); location.reload();
        };

        document.getElementById('f-promo').onsubmit = async (e) => {
            e.preventDefault();
            await pb.collection('promos').create({
                code: document.getElementById('c-code').value.toUpperCase(),
                reduction: document.getElementById('c-reduc').value,
                actif: true
            });
            location.reload();
        };
    </script>
</body>
</html>
