<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin | TechStore</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
    <style>
        .admin-section { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #334155; }
        input, select { margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-add { background: #4ade80; color: #064e3b; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body style="padding: 40px; max-width: 1000px; margin: 0 auto;">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>⚙️ Administration TechStore</h1>
        <a href="index.html" style="color: #3b82f6; text-decoration: none;">← Retour Boutique</a>
    </div>

    <div class="admin-section">
        <h2>📦 Ajouter un Produit</h2>
        <form id="product-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="text" id="p-nom" placeholder="Nom du produit" required>
            <input type="number" id="p-prix" placeholder="Prix (€)" required>
            <input type="text" id="p-cat" placeholder="Catégorie (ex: Batterie)">
            <input type="number" id="p-stock" placeholder="Stock initial" required>
            <input type="file" id="p-photo" style="grid-column: span 2;">
            <button type="submit" class="btn-buy btn-add" style="grid-column: span 2;">Ajouter le produit</button>
        </form>
    </div>

    <div class="admin-section" style="border-color: #fbbf24;">
        <h2 style="color: #fbbf24;">🏷️ Gestion des Codes Promo</h2>
        <form id="promo-form" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="promo-code" placeholder="Code (ex: NOEL20)" required style="flex: 2;">
            <input type="number" id="promo-reduc" placeholder="Réduction (%)" required style="flex: 1;">
            <button type="submit" class="btn-buy btn-add" style="flex: 1; padding: 10px;">Créer</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Réduction</th>
                    <th>Statut</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="promo-list"></tbody>
        </table>
    </div>

    <script>
        const pb = new PocketBase('http://127.0.0.1:8090');

        // VERIFICATION ADMIN (Optionnel : ajuste selon ton email)
        if (!pb.authStore.isValid || pb.authStore.model.email !== 'admin@test.com') {
            // alert("Accès réservé à l'administrateur");
            // window.location.href = "index.html";
        }

        // --- GESTION PRODUITS ---
        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('nom', document.getElementById('p-nom').value);
            formData.append('prix', document.getElementById('p-prix').value);
            formData.append('categorie', document.getElementById('p-cat').value);
            formData.append('stock', document.getElementById('p-stock').value);
            if(document.getElementById('p-photo').files[0]) {
                formData.append('photo', document.getElementById('p-photo').files[0]);
            }

            try {
                await pb.collection('produits').create(formData);
                alert("Produit ajouté !");
                location.reload();
            } catch (err) { alert("Erreur : " + err.message); }
        };

        // --- GESTION CODES PROMO ---
        async function chargerPromos() {
            const promos = await pb.collection('promos').getFullList({ sort: '-created' });
            const list = document.getElementById('promo-list');
            list.innerHTML = promos.map(p => `
                <tr>
                    <td style="font-weight:bold; color:#4ade80;">${p.code}</td>
                    <td>-${p.reduction}%</td>
                    <td>${p.actif ? '✅ Actif' : '❌ Inactif'}</td>
                    <td>
                        <button onclick="supprimerPromo('${p.id}')" class="btn-delete">Supprimer</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('promo-form').onsubmit = async (e) => {
            e.preventDefault();
            const code = document.getElementById('promo-code').value.toUpperCase();
            const reduction = document.getElementById('promo-reduc').value;

            try {
                await pb.collection('promos').create({
                    "code": code,
                    "reduction": parseInt(reduction),
                    "actif": true
                });
                alert("Code Promo créé !");
                document.getElementById('promo-form').reset();
                chargerPromos();
            } catch (err) { alert("Erreur : " + err.message); }
        };

        async function supprimerPromo(id) {
            if(confirm("Supprimer ce code promo ?")) {
                await pb.collection('promos').delete(id);
                chargerPromos();
            }
        }

        // Lancement
        chargerPromos();
    </script>
</body>
</html>
