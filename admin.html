<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Stock | Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .admin-container { max-width: 900px; margin: auto; }
        .admin-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 30px; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box;}
        .btn-add { background: #4ade80; color: #000; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; }
        
        /* Style pour la liste de modification */
        .product-list-item { display: flex; align-items: center; background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 10px; gap: 15px; border: 1px solid #334155; }
        .product-list-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-update { background: #3b82f6; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1 style="text-align: center; color: #fbbf24;">⚙️ Espace Gestion</h1>
        <a href="index.html" style="color: #94a3b8; text-decoration: none;">← Retour Boutique</a>

        <div class="admin-card" style="margin-top: 20px;">
            <h2 style="margin-top:0;">📦 Ajouter un nouveau produit</h2>
            <form id="add-product-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" id="nom" placeholder="Nom du produit" required>
                    <input type="text" id="categorie" placeholder="Catégorie (ex: Alims)" required>
                    <input type="number" id="prix" placeholder="Prix (€)" required>
                    <input type="number" id="stock" placeholder="Stock" required>
                </div>
                <input type="file" id="photo" accept="image/*">
                <button type="submit" class="btn-add">Mettre en ligne</button>
            </form>
        </div>

        <h2 style="color: #fbbf24;">✏️ Modifier le stock existant</h2>
        <div id="admin-product-list">
            </div>
    </div>

    <script>
        const pb = new PocketBase('http://127.0.0.1:8090');

        // Sécurité
        if (!pb.authStore.isValid || pb.authStore.model.email !== 'admin@test.com') {
            window.location.href = "index.html";
        }

        // CHARGER LA LISTE DE GESTION
        async function chargerGestion() {
            const produits = await pb.collection('produits').getFullList({ sort: '-created' });
            const container = document.getElementById('admin-product-list');
            
            container.innerHTML = produits.map(p => `
                <div class="product-list-item">
                    <img src="${p.photo ? pb.files.getUrl(p, p.photo) : 'https://via.placeholder.com/50'}" >
                    <div style="flex-grow: 1;">
                        <strong style="display:block;">${p.nom}</strong>
                        <small>${p.categorie} | ${p.prix}€ | Stock: ${p.stock}</small>
                    </div>
                    <div>
                        <button onclick="modifierStock('${p.id}', ${p.stock})" class="btn-update">Stock ±</button>
                        <button onclick="supprimerProduit('${p.id}')" class="btn-delete">Supprimer</button>
                    </div>
                </div>
            `).join('');
        }

        // SUPPRIMER
        async function supprimerProduit(id) {
            if (confirm("Supprimer ce produit définitivement ?")) {
                await pb.collection('produits').delete(id);
                chargerGestion();
            }
        }

        // MODIFIER STOCK RAPIDEMENT
        async function modifierStock(id, actuel) {
            const nouveau = prompt("Nouveau stock :", actuel);
            if (nouveau !== null) {
                await pb.collection('produits').update(id, { stock: nouveau });
                chargerGestion();
            }
        }

        // AJOUTER
        document.getElementById('add-product-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('nom', document.getElementById('nom').value);
            formData.append('prix', document.getElementById('prix').value);
            formData.append('categorie', document.getElementById('categorie').value);
            formData.append('stock', document.getElementById('stock').value);
            const photoFile = document.getElementById('photo').files[0];
            if (photoFile) formData.append('photo', photoFile);

            try {
                await pb.collection('produits').create(formData);
                alert("Ajouté !");
                location.reload();
            } catch (err) { alert(err.message); }
        };

        chargerGestion();
    </script>
</body>
</html>
