<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TechStore | Accueil</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
</head>
<body>
    <header>
        <h1 style="margin:0; font-size: 1.5rem; color: #4ade80;">TechStore</h1>
        <div id="user-menu"></div>
    </header>

    <div class="controls">
        <input type="text" id="search" placeholder="🔍 Rechercher..." oninput="filtrerEtTrier()" style="flex: 2; min-width: 200px;">
        <select id="sort-select" onchange="filtrerEtTrier()" style="flex: 1; min-width: 150px;">
            <option value="nom">Nom (A-Z)</option>
            <option value="prix-asc">Prix Croissant ↑</option>
            <option value="prix-desc">Prix Décroissant ↓</option>
        </select>
    </div>

    <div id="category-bar" style="display:flex; justify-content:center; gap:10px; margin-bottom:20px; flex-wrap:wrap;"></div>

    <div id="vitrine" class="container"></div>

    <div id="cart-sidebar">
        <h2>Votre Panier</h2>
        <div id="cart-items"></div>
        <hr>
        <h3>Total: <span id="cart-total">0</span>€</h3>
        <button class="btn-buy" onclick="validerCommande()">Valider l'achat</button>
        <button onclick="toggleCart()" style="background:none; color:white; border:none; margin-top:10px; cursor:pointer; width:100%;">Fermer</button>
    </div>

    <div id="cart-icon" onclick="toggleCart()" style="position:fixed; bottom:20px; right:20px; background:#3b82f6; width:60px; height:60px; border-radius:50%; display:flex; justify-content:center; align-items:center; cursor:pointer; font-size:1.5rem;">
        🛒 <span id="cart-count" style="position:absolute; top:0; right:0; background:red; border-radius:50%; padding:2px 7px; font-size:0.7rem;">0</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
