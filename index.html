<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Tech & Auto Pro | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
</head>
<body>

    <header>
        <h1>🚀 Catalogue Dynamique</h1>
        
        <div class="category-filters">
            <button onclick="filtrerParCategorie('Tous')" class="btn-cat">Tout voir</button>
            <button onclick="filtrerParCategorie('Batterie')" class="btn-cat">Batteries ⚡</button>
            <button onclick="filtrerParCategorie('Pneu')" class="btn-cat">Pneus 🚗</button>
            <button onclick="filtrerParCategorie('Informatique')" class="btn-cat">Composants 💻</button>
        </div>

        <div class="controls">
            <input type="text" id="search" placeholder="Rechercher un produit..." oninput="filtrer()">
        </div>
    </header>

    <div id="cart-icon" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>

    <div id="cart-sidebar">
        <div style="padding: 20px;">
            <button onclick="toggleCart()" class="btn-close">Fermer ✖</button>
            <h2>Mon Panier</h2>
            <div id="cart-items"></div>
            <hr style="border: 0.5px solid #334155; margin: 20px 0;">
            <div class="total-container">
                Total: <span id="cart-total">0</span> €
            </div>
            <button onclick="validerCommande()" class="btn-validate">Valider la commande</button>
        </div>
    </div>

    <div id="notification"></div>
    <div id="vitrine" class="container"></div>

    <script src="script.js"></script>
</body>
</html>
