<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore | Boutique High-Tech</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
</head>
<body>

    <header>
        <div id="user-menu" style="display: flex; justify-content: flex-end; align-items: center; gap: 20px;">
            </div>

        <h1>TechStore Pro</h1>
        
       <div class="controls" style="display: flex; gap: 10px; align-items: center; justify-content: center; margin-top: 20px; flex-wrap: wrap; padding: 0 20px;">
    
    <div style="position: relative; width: 300px;">
        <input type="text" id="search" placeholder="🔍 Rechercher un produit..." 
               oninput="filtrerEtTrier()" 
               style="width: 100%; padding: 12px 20px; border-radius: 25px; background: #1e293b; border: 1px solid #334155; color: white; outline: none;">
    </div>

    <select id="sort-select" onchange="filtrerEtTrier()" 
            style="padding: 12px 20px; border-radius: 25px; background: #1e293b; color: white; border: 1px solid #334155; cursor: pointer; outline: none;">
        <option value="nom">Trier par : Nom (A-Z)</option>
        <option value="prix-asc">Prix : Croissant ↑</option>
        <option value="prix-desc">Prix : Décroissant ↓</option>
        <option value="stock-desc">Plus de stock</option>
    </select>

</div>

<div id="category-bar" class="category-filters" style="margin-bottom: 30px;">
    </div>
    </header>

    <div id="vitrine" class="container">
        </div>

    <div id="cart-icon" onclick="toggleCart()">
        🛒 <span id="cart-count" style="position:absolute; top:0; right:0; background:red; border-radius:50%; width:20px; height:20px; font-size:12px; display:flex; justify-content:center; align-items:center;">0</span>
    </div>

    <div id="cart-sidebar">
        <div style="padding: 25px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Mon Panier</h2>
                <button onclick="toggleCart()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">✕</button>
            </div>
            <div id="cart-items" style="margin-top:20px; max-height: 60vh; overflow-y:auto;"></div>
            <div style="margin-top:20px; border-top: 1px solid #334155; padding-top:20px;">
                <div style="display:flex; justify-content:space-between; font-size:1.3rem; font-weight:bold;">
                    <span>Total:</span>
                    <span id="cart-total">0</span>€
                </div>
                <button onclick="validerCommande()" class="btn-buy" style="margin-top:20px; border-radius:8px;">Valider l'achat</button>
            </div>
        </div>
    </div>

    <div id="notification" style="position:fixed; bottom:100px; right:30px; background:#4ade80; color:black; padding:15px 25px; border-radius:8px; display:none; font-weight:bold; z-index:2000;"></div>

    <script src="script.js"></script>
</body>
</html>
