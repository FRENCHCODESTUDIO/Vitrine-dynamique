<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Tech Pro | Dashboard Dynamique</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
</head>
<body>

    <h1>🚀 Stock Client en Direct</h1>
    
    <div id="vitrine" class="container">
        </div>

    <script>
        // Connexion à ton PocketBase local
        const pb = new PocketBase('http://127.0.0.1:8090');

        async function chargerBoutique() {
            try {
                // On récupère la liste des produits
                const records = await pb.collection('produits').getFullList();
                const vitrine = document.getElementById('vitrine');
                vitrine.innerHTML = ''; 

                records.forEach(p => {
                    const urlPhoto = p.photo ? pb.files.getUrl(p, p.photo) : 'https://via.placeholder.com/400';
                    const alerte = p.stock < 10;

                    vitrine.innerHTML += `
                        <div class="card">
                            <div class="image-container">
                                <img src="${urlPhoto}" alt="${p.nom}">
                            </div>
                            <div class="content">
                                <span class="stock-badge ${alerte ? 'low-stock' : ''}">
                                    ${alerte ? '⚠️ Stock Faible : ' : '✅ En stock : '}${p.stock}
                                </span>
                                <h3>${p.nom}</h3>
                                <div class="price">${p.prix} €</div>
                            </div>
                            <button class="btn-buy" onclick="commander('${p.id}', ${p.stock}, '${p.nom}')">
                                Acheter cet article
                            </button>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Erreur PocketBase :", err);
            }
        }

        // FONCTION MAGIQUE : Diminue le stock lors du clic
        async function commander(id, stockActuel, nom) {
            if (stockActuel <= 0) {
                alert("Désolé, " + nom + " est épuisé !");
                return;
            }

            try {
                const nouveauStock = stockActuel - 1;

                // Mise à jour dans PocketBase
                await pb.collection('produits').update(id, {
                    "stock": nouveauStock
                });

                alert("Merci pour votre achat ! Stock restant de " + nom + " : " + nouveauStock);
                
                // On recharge la liste pour voir le changement sans rafraîchir toute la page
                chargerBoutique();

            } catch (err) {
                console.error("Erreur de mise à jour :", err);
                alert("Erreur : Vérifie que la règle 'Update' est déverrouillée dans PocketBase !");
            }
        }

        // Lancement au chargement de la page
        chargerBoutique();
    </script>
</body>
</html>
