<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TechStore | Composants PC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
</head>
<body>
    <header>
        <h1 style="margin:0; color:#4ade80;">TechStore</h1>
        <div id="user-menu"></div>
    </header>

    <div class="controls">
        <div style="display:flex; gap:10px; width:100%; max-width:600px; margin: 0 auto 15px;">
            <input type="text" id="search" placeholder="🔍 Rechercher un composant..." oninput="filtrerEtTrier()">
            <select id="sort-select" onchange="filtrerEtTrier()">
                <option value="nom">Nom (A-Z)</option>
                <option value="prix-asc">Prix Croissant ↑</option>
                <option value="prix-desc">Prix Décroissant ↓</option>
            </select>
        </div>
        <div id="category-bar" style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;"></div>
    </div>

    <div id="vitrine" class="container"></div>

    <div id="cart-sidebar">
        <h2 style="margin-top:0;">🛒 Votre Panier</h2>
        <div id="cart-items" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;"></div>
        
        <div class="promo-box">
            <label>Code promo ?</label>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="promo-input" placeholder="Ex: PROMO30">
                <button onclick="appliquerPromo()" class="btn-promo-ok">OK</button>
            </div>
            <div id="promo-msg"></div>
        </div>

        <h3 style="display: flex; justify-content: space-between; border-top: 1px solid #334155; padding-top:15px;">
            Total: <span id="cart-total">0€</span>
        </h3>
        
        <button class="btn-buy" onclick="validerCommande()" style="border-radius: 10px;">Confirmer la commande</button>
        <button onclick="toggleCart()" style="background:none; color:#94a3b8; border:none; margin-top:15px; cursor:pointer; width:100%;">Fermer</button>
    </div>

    <div id="cart-icon" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
