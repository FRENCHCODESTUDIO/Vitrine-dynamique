<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Ma Boutique</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
</head>
<body style="background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">

    <div style="background: #1e1e1e; padding: 40px; border-radius: 10px; border: 1px solid #333; width: 350px;">
        <h2 style="text-align: center; margin-bottom: 25px;">Se connecter</h2>
        
        <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="email" id="email" placeholder="Email" required style="padding: 12px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white;">
            <input type="password" id="password" placeholder="Mot de passe" required style="padding: 12px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white;">
            
            <button type="submit" class="btn-buy" style="padding: 12px; font-weight: bold; cursor: pointer;">Connexion</button>
        </form>
        
        <p id="error-msg" style="color: #ef4444; font-size: 0.9rem; text-align: center; margin-top: 15px; display: none;"></p>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #888; text-decoration: none; font-size: 0.9rem;">← Retour boutique</a>
        </div>
    </div>

    <script>
        // Remplace par ton IP si tu testes sur le Wi-Fi
        const pb = new PocketBase('http://127.0.0.1:8090');

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorP = document.getElementById('error-msg');

            try {
                // Tentative de connexion
                await pb.collection('users').authWithPassword(email, pass);
                // Si ça marche, on retourne à l'accueil
                window.location.href = "index.html";
            } catch (err) {
                errorP.innerText = "Identifiants incorrects";
                errorP.style.display = "block";
            }
        };
    </script>
</body>
</html>
